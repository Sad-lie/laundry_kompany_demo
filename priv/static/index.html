<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundry Kampany - WhatsApp Laundry Service</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo {
            font-size: 60px;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .tagline {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .features {
            text-align: left;
            margin: 30px 0;
        }
        .feature {
            display: flex;
            align-items: center;
            margin: 15px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .feature-icon {
            font-size: 24px;
            margin-right: 15px;
        }
        .feature-text {
            color: #444;
        }
        .feature-text strong {
            display: block;
            color: #333;
        }
        .feature-text span {
            font-size: 14px;
            color: #666;
        }
        .cta {
            background: #25D366;
            color: white;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4);
        }
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🧺</div>
        <h1>Laundry Kampany</h1>
        <p class="tagline">Fresh laundry, delivered to your door</p>
        
        <div class="features">
            <div class="feature">
                <span class="feature-icon">📱</span>
                <div class="feature-text">
                    <strong>Order via WhatsApp</strong>
                    <span>Simply message us to book</span>
                </div>
            </div>
            <div class="feature">
                <span class="feature-icon">🚚</span>
                <div class="feature-text">
                    <strong>Free Pickup & Delivery</strong>
                    <span>We come to you</span>
                </div>
            </div>
            <div class="feature">
                <span class="feature-icon">✨</span>
                <div class="feature-text">
                    <strong>Quality Service</strong>
                    <span>Wash, dry clean & iron</span>
                </div>
            </div>
        </div>

        <a href="https://wa.me/234800LAUNDRY" class="cta">
            💬 Chat on WhatsApp
        </a>

        <div class="footer">
            <p>Admin: <a href="/admin" style="color: #667eea;">Login</a></p>
        </div>
    </div>
</body>
</html>
